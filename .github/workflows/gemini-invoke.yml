name: "▶️ Gemini Invoke"

on:
  workflow_call:
    inputs:
      additional_context:
        type: "string"
        description: "Any additional context from the request"
        required: false

concurrency:
  group: "${{ github.workflow }}-invoke-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}"
  cancel-in-progress: false

defaults:
  run:
    shell: "bash"

jobs:
  invoke:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    steps:
      - name: "Mint identity token"
        id: "mint_identity_token"
        if: |-
          ${{ vars.APP_ID }}
        uses: "actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf" # ratchet:actions/create-github-app-token@v2
        with:
          app-id: "${{ vars.APP_ID }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY }}"
          permission-contents: "read"
          permission-issues: "write"
          permission-pull-requests: "write"

      # Inject cached OAuth credentials from the repo owner's personal Google Account.
      # This allows CI to authenticate as the owner (with Google AI Pro subscription),
      # enabling Gemini 3 Pro auto-routing and higher quota limits (1,500 req/day).
      # The refresh token in oauth_creds.json is long-lived and auto-renews access tokens.
      # If it ever expires, re-run `/login` locally and update the GEMINI_OAUTH_CREDS secret.
      # Falls back to GEMINI_API_KEY if OAuth credentials are not set.
      - name: "Inject Gemini OAuth credentials"
        env:
          GEMINI_OAUTH_CREDS: "${{ secrets.GEMINI_OAUTH_CREDS }}"
        run: |
          if [ -n "$GEMINI_OAUTH_CREDS" ]; then
            mkdir -p ~/.gemini
            # Auth credentials (refresh token + access token)
            echo "$GEMINI_OAUTH_CREDS" > ~/.gemini/oauth_creds.json
            chmod 600 ~/.gemini/oauth_creds.json
            # Tell CLI to use oauth-personal auth method
            echo '{"security":{"auth":{"selectedType":"oauth-personal"}},"maxSessionTurns":50}' > ~/.gemini/settings.json
            # Set the active Google account
            echo '{"active":"${{ vars.GEMINI_OAUTH_ACCOUNT }}"}' > ~/.gemini/google_accounts.json
            echo "✅ OAuth credentials injected"
          else
            echo "⏭️ No OAuth credentials found, falling back to API key"
          fi

      - name: "Pre-pull GitHub MCP server image"
        run: docker pull ghcr.io/github/github-mcp-server:latest

      - name: "Run Gemini CLI"
        id: "run_gemini"
        continue-on-error: true
        uses: "google-github-actions/run-gemini-cli@v0" # ratchet:exclude
        env:
          TITLE: "${{ github.event.pull_request.title || github.event.issue.title }}"
          DESCRIPTION: "${{ github.event.pull_request.body || github.event.issue.body }}"
          EVENT_NAME: "${{ github.event_name }}"
          GITHUB_TOKEN: "${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}"
          IS_PULL_REQUEST: "${{ !!github.event.pull_request }}"
          ISSUE_NUMBER: "${{ github.event.pull_request.number || github.event.issue.number }}"
          REPOSITORY: "${{ github.repository }}"
          ADDITIONAL_CONTEXT: "${{ inputs.additional_context }}"
        with:
          gcp_location: "${{ vars.GOOGLE_CLOUD_LOCATION }}"
          gcp_project_id: "${{ vars.GOOGLE_CLOUD_PROJECT }}"
          gcp_service_account: "${{ vars.SERVICE_ACCOUNT_EMAIL }}"
          gcp_workload_identity_provider: "${{ vars.GCP_WIF_PROVIDER }}"
          gemini_api_key: "${{ secrets.GEMINI_API_KEY }}"
          gemini_cli_version: "${{ vars.GEMINI_CLI_VERSION }}"
          gemini_debug: "${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}"
          gemini_model: "${{ vars.GEMINI_MODEL }}"
          google_api_key: "${{ secrets.GOOGLE_API_KEY }}"
          use_gemini_code_assist: "${{ vars.GOOGLE_GENAI_USE_GCA }}"
          use_vertex_ai: "${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}"
          upload_artifacts: "${{ vars.UPLOAD_ARTIFACTS }}"
          workflow_name: "gemini-invoke"
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:latest"
                  ],
                  "includeTools": [
                    "get_me",
                    "add_issue_comment",
                    "issue_read",
                    "list_issues",
                    "search_issues",
                    "create_pull_request",
                    "pull_request_read",
                    "list_pull_requests",
                    "search_pull_requests",
                    "create_branch",
                    "create_or_update_file",
                    "delete_file",
                    "fork_repository",
                    "get_commit",
                    "get_file_contents",
                    "list_commits",
                    "push_files",
                    "search_code"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: "/gemini-invoke"

      - name: "Wait before retry"
        if: steps.run_gemini.outcome == 'failure'
        run: |
          echo "⏳ First attempt failed. Waiting 60s before retry..."
          sleep 60

      - name: "Run Gemini CLI (retry)"
        if: steps.run_gemini.outcome == 'failure'
        id: "run_gemini_retry"
        uses: "google-github-actions/run-gemini-cli@v0" # ratchet:exclude
        env:
          TITLE: "${{ github.event.pull_request.title || github.event.issue.title }}"
          DESCRIPTION: "${{ github.event.pull_request.body || github.event.issue.body }}"
          EVENT_NAME: "${{ github.event_name }}"
          GITHUB_TOKEN: "${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}"
          IS_PULL_REQUEST: "${{ !!github.event.pull_request }}"
          ISSUE_NUMBER: "${{ github.event.pull_request.number || github.event.issue.number }}"
          REPOSITORY: "${{ github.repository }}"
          ADDITIONAL_CONTEXT: "${{ inputs.additional_context }}"
        with:
          gcp_location: "${{ vars.GOOGLE_CLOUD_LOCATION }}"
          gcp_project_id: "${{ vars.GOOGLE_CLOUD_PROJECT }}"
          gcp_service_account: "${{ vars.SERVICE_ACCOUNT_EMAIL }}"
          gcp_workload_identity_provider: "${{ vars.GCP_WIF_PROVIDER }}"
          gemini_api_key: "${{ secrets.GEMINI_API_KEY }}"
          gemini_cli_version: "${{ vars.GEMINI_CLI_VERSION }}"
          gemini_debug: "${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}"
          gemini_model: "${{ vars.GEMINI_MODEL }}"
          google_api_key: "${{ secrets.GOOGLE_API_KEY }}"
          use_gemini_code_assist: "${{ vars.GOOGLE_GENAI_USE_GCA }}"
          use_vertex_ai: "${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}"
          upload_artifacts: "${{ vars.UPLOAD_ARTIFACTS }}"
          workflow_name: "gemini-invoke"
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:latest"
                  ],
                  "includeTools": [
                    "get_me",
                    "add_issue_comment",
                    "issue_read",
                    "list_issues",
                    "search_issues",
                    "create_pull_request",
                    "pull_request_read",
                    "list_pull_requests",
                    "search_pull_requests",
                    "create_branch",
                    "create_or_update_file",
                    "delete_file",
                    "fork_repository",
                    "get_commit",
                    "get_file_contents",
                    "list_commits",
                    "push_files",
                    "search_code"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: "/gemini-invoke"
